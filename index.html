<!DOCTYPE html>
<html lang="en">
  <head >
    <meta charset="UTF-8" />

    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' 'unsafe-eval' *; img-src 'self' data: blob: *; style-src 'self' 'unsafe-inline' *; script-src 'self' 'unsafe-inline' 'unsafe-eval' *; worker-src 'self' blob: https: data:;"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Prism -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-c.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-python.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-java.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-jsx.min.js" defer></script>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.min.css"
    />
    <script>
      window.pdfjsLibReady = import("https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs")
        .then((pdfjsLib) => {
          pdfjsLib.GlobalWorkerOptions.workerSrc =
            "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs";
          window.pdfjsLib = pdfjsLib;
          return pdfjsLib;
        })
        .catch((error) => {
          console.error("Failed to load pdf.js", error);
          return null;
        });
    </script>

    <!-- ✅ Material Symbols (for header icons like menu/dark_mode/close/download/person) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />

    <!-- ✅ Material Icons (for delete_forever icon) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />

    <!-- ✅ LOAD SUPABASE FIRST (NO defer) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ✅ CREATE CLIENT IMMEDIATELY (NOT DOMContentLoaded) -->
    <script>
      const SUPABASE_URL = "https://nikzyppkwedmzldghrgh.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pa3p5cHBrd2VkbXpsZGdocmdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0OTU1NzQsImV4cCI6MjA4NTA3MTU3NH0.ssb4-8V0wkkxyfDQSzfzgTrTbjxDu1OWyjogzJlupYM";

      window.supabaseClient = supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
        {
          auth: {
            autoRefreshToken: true,
            persistSession: true,
            detectSessionInUrl: true,
          },
        }
      );

      console.log("✅ Supabase initialized BEFORE script.js");
    </script>

    <!-- ✅ NOW load your main JS -->
    <script src="script.js" defer></script>
  </head>

  <body class="in-app ui-loading">
    <div class="app-shell-loader" id="app-shell-loader" aria-hidden="true">
      <div class="app-shell-loader__brand">
        <img class="app-shell-loader__logo" src="genie-logo.png" alt="Genie logo" />
        <strong class="app-shell-loader__title">Genie</strong>
      </div>
    </div>
    <!-- <div class="welcome">
      <h1 class="welcomes">
        <span>G</span><span>e</span><span>n</span><span>i</span><span>e</span>
      </h1>
      <p>Click here to start a conversation</p>
      <div class="welcome-actions">
        <button class="start-chat-btn" type="button">Chat with Genie</button>
        <a id="download-app-btn" class="download-app-btn" href="#">Download App</a>
      </div>
    </div> -->

    <!-- Sidebar for chat history -->
    <div class="history-sidebar">
      <div class="history-actions">
        <!-- NEW CHAT -->
        <button id="new-chat-btn" class="new-chat-btn" type="button">
          <span class="material-symbols-outlined">add</span>
          <span class="new-chat-text">New chat</span>
        </button>

        <!-- CLOSE SIDEBAR -->
        <button
          id="close-sidebar"
          class="material-symbols-outlined close-sidebar-btn"
          type="button"
        >
          close
        </button>
      </div>

      <!-- DELETE ALL -->
      <button class="delete-all-btn" type="button">
        <span class="material-icons">delete_forever</span>
        Delete All
      </button>

      <!-- CHAT LIST -->
      <ul class="history-list">
        <!-- sessions will render here -->
      </ul>

      <div class="sidebar-footer">
        <button id="sidebar-settings-btn" class="sidebar-settings-btn" type="button">
          <span class="material-symbols-outlined">settings</span>
          <span class="sidebar-settings-copy">
            <strong>Settings</strong>
            <small id="sidebar-memory-summary">Theme and account</small>
          </span>
        </button>
      </div>
    </div>

    <div class="container">
      <button class="chatbot-toggler" type="button"></button>

      <div class="chatbot">
        <header class="chat-header">
          <!-- LEFT -->
          <div class="header-left">
            <button
              id="sidebar-toggle"
              class="menu-toggle material-symbols-outlined"
              type="button"
            >
              menu
            </button>
          </div>

          <!-- CENTER -->
          <h2 class="chat-title">
            <img
              class="chat-title-logo"
              src="genie-logo.png"
              alt="Genie logo"
            />
            <span class="chat-title-text">Genie</span>
          </h2>

          <!-- RIGHT -->
          <div class="header-right">
            <a
              id="apk-download-header"
              class="apk-download-btn"
              href="https://github.com/Anup851/genie.apk/releases/download/v1.0/Genie.AI_v1.0.apk"
              download
            >
              <span class="material-symbols-outlined">download</span>
              <span class="apk-text">APK</span>
            </a>

            <button
              id="close-chatbot"
              class="material-symbols-outlined close-btn"
              type="button"
            >
              close
            </button>
          </div>
        </header>

        <!-- ✅ Global Chat Container (Corrected Placement) -->
        <div class="chat-container">
          <div class="chat-home">
            <h3 class="chat-home-title">What can I help with today?</h3>
            <p class="chat-home-subtitle">
              Ask, code, learn, and generate with Genie.
            </p>
            <div class="chat-home-prompts" aria-label="Suggested prompts">
              <button
                class="chat-home-prompt"
                type="button"
                data-group="summarize"
              >
                <span class="chat-home-prompt__icon material-symbols-outlined">article</span>
                <span class="chat-home-prompt__copy">
                  <span class="chat-home-prompt__title">Summarize</span>
                  <span class="chat-home-prompt__desc">Turn long content into quick notes.</span>
                </span>
              </button>
              <button
                class="chat-home-prompt"
                type="button"
                data-group="code"
              >
                <span class="chat-home-prompt__icon material-symbols-outlined">code</span>
                <span class="chat-home-prompt__copy">
                  <span class="chat-home-prompt__title">Code</span>
                  <span class="chat-home-prompt__desc">Generate practical code with explanation.</span>
                </span>
              </button>
              <button
                class="chat-home-prompt"
                type="button"
                data-group="brainstorm"
              >
                <span class="chat-home-prompt__icon material-symbols-outlined">emoji_objects</span>
                <span class="chat-home-prompt__copy">
                  <span class="chat-home-prompt__title">Brainstorm</span>
                  <span class="chat-home-prompt__desc">Get fast suggestions to start from.</span>
                </span>
              </button>
              <button
                class="chat-home-prompt"
                type="button"
                data-group="plan"
              >
                <span class="chat-home-prompt__icon material-symbols-outlined">route</span>
                <span class="chat-home-prompt__copy">
                  <span class="chat-home-prompt__title">Make a plan</span>
                  <span class="chat-home-prompt__desc">Break work into clear next steps.</span>
                </span>
              </button>
            </div>
            <div class="chat-home-options" id="chat-home-options" hidden></div>
          </div>
        </div>

        <ul class="chatbox">
            <!-- <div class="bot-message-container">
              <p>Hello I am Genie 👏 <br />How can I assist you today?</p>
            </div> -->
        </ul>

        <div id="document-context-banner" class="document-context-banner" hidden>
          <div class="document-context-main">
            <span class="material-symbols-outlined">description</span>
            <div class="document-context-copy">
              <strong id="document-context-title">Document ready</strong>
              <span id="document-context-subtitle">Answer may use uploaded document.</span>
            </div>
          </div>
          <button id="clear-document-btn" class="document-context-clear" type="button">
            Clear
          </button>
        </div>

        <div class="chat-input">
          <div id="selected-media-preview" class="selected-media-preview" style="display: none"></div>
          <label
            for="image-upload"
            class="upload-icon"
            title="Upload files"
          >
            +
          </label>
          <input type="file" id="image-upload" accept="image/*,.pdf,.txt,.md,.json,.csv,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.rtf,.xml,.html,.css,.js,.ts,.py,.java,.c,.cpp" style="display: none" />
          <textarea placeholder="Ask anything with GENIE..." spellcheck="false" required></textarea>
          <button
            id="mic-btn"
            class="material-symbols-outlined"
            title="Speak"
            type="button"
          >
            mic
          </button>
          <button
            id="image-mode-btn"
            class="material-symbols-outlined"
            title="Image mode"
            type="button"
          >
            image
          </button>
          <button id="send-btn" class="material-symbols-outlined" type="button">
            send
          </button>
          <button
            id="stop-btn"
            class="material-symbols-outlined"
            title="Stop"
            type="button"
            style="display: none"
          >
            stop
          </button>
        </div>
        <div class="chat-footer-note">
          Genie can make mistakes. Check important info.
        </div>
      </div>
    </div>

    <div id="memory-modal" class="memory-modal" hidden>
      <div class="memory-modal-backdrop" data-close-memory="true"></div>
      <div class="memory-modal-card" role="dialog" aria-modal="true" aria-labelledby="memory-modal-title">
        <div class="memory-modal-header">
          <div>
            <h3 id="memory-modal-title">Genie Settings</h3>
            <p>Manage quick app preferences in one place.</p>
          </div>
          <button id="close-memory-btn" class="material-symbols-outlined memory-close-btn" type="button">
            close
          </button>
        </div>
        <div class="settings-overview-grid">
          <button id="settings-theme-btn" class="settings-theme-btn" type="button">
            <span class="material-symbols-outlined">dark_mode</span>
            <span class="settings-theme-copy">
              <strong>Appearance</strong>
              <small id="settings-theme-label">Dark mode</small>
            </span>
          </button>
          <button id="auth-btn" class="settings-auth-btn" type="button">
            <span class="material-symbols-outlined">person</span>
            <span class="auth-copy">
              <strong class="auth-text">Account Login</strong>
              <small class="auth-subtext">Sign in or manage account</small>
            </span>
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
